<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PRC PDF Preview</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .bar { display:flex; gap:12px; margin-bottom: 12px; }
    .bar form { margin: 0; }
    button { padding: 10px 16px; font-size: 14px; cursor: pointer; }
    .pdfbox { width: 100%; height: 85vh; border: 1px solid #999; }
  </style>
</head>
<body>

  <div class="bar">
    <form method="post" action="/email_pdf">
      <button type="submit">EMAIL PDF</button>
    </form>

    <form method="post" action="/clear_all">
      <button type="submit">CLEAR</button>
    </form>
  </div>

  <iframe class="pdfbox" src="/pdf"></iframe>

</body>
</html>
